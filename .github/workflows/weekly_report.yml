name: HSMI Weekly Performance Report

on:
  schedule:
    # 9:00 am AEST every Monday = 23:00 UTC Sunday
    - cron: '0 23 * * 0'
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  report:
    name: Weekly Performance Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly report
        env:
          CLOUDBEDS_API_KEY: ${{ secrets.CLOUDBEDS_API_KEY }}
          CLOUDBEDS_PROPERTY_ID: ${{ secrets.CLOUDBEDS_PROPERTY_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python reports/weekly_report.py
