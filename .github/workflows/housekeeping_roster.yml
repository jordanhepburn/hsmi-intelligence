name: HSMI Housekeeping Roster

on:
  schedule:
    # 8:00 am AEST = 22:00 UTC
    - cron: '0 22 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  roster:
    name: Housekeeping Roster
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run housekeeping roster
        env:
          CLOUDBEDS_API_KEY: ${{ secrets.CLOUDBEDS_API_KEY }}
          CLOUDBEDS_PROPERTY_ID: ${{ secrets.CLOUDBEDS_PROPERTY_ID }}
          SLACK_OPERATIONS_WEBHOOK_URL: ${{ secrets.SLACK_OPERATIONS_WEBHOOK_URL }}
        run: python reports/housekeeping_roster.py
