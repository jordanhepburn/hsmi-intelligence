name: Test postReservation (delete after)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Create + delete test reservation
    runs-on: ubuntu-latest

    steps:
      - name: Create test reservation
        id: create
        run: |
          RESPONSE=$(curl -s -X POST https://api.cloudbeds.com/api/v1.3/postReservation \
            -H "x-api-key: ${{ secrets.CLOUDBEDS_API_KEY }}" \
            --data-urlencode "propertyID=${{ secrets.CLOUDBEDS_PROPERTY_ID }}" \
            --data-urlencode "sourceID=s-3-1" \
            --data-urlencode "startDate=2026-06-15" \
            --data-urlencode "endDate=2026-06-16" \
            --data-urlencode "guestFirstName=Test" \
            --data-urlencode "guestLastName=Cherry" \
            --data-urlencode "guestEmail=test@hepburnspringsmotorinn.com" \
            --data-urlencode "guestPhone=0400000000" \
            --data-urlencode "guestCountry=AU" \
            --data-urlencode "guestZip=3461" \
            --data-urlencode "paymentMethod=cash" \
            --data-urlencode "rooms[0][roomTypeID]=8444747503112281" \
            --data-urlencode "rooms[0][rateID]=8444747503112283" \
            --data-urlencode "rooms[0][quantity]=1" \
            --data-urlencode "adults[0][roomTypeID]=8444747503112281" \
            --data-urlencode "adults[0][quantity]=1" \
            --data-urlencode "adults[0][adults]=1" \
            --data-urlencode "children[0][roomTypeID]=8444747503112281" \
            --data-urlencode "children[0][quantity]=1" \
            --data-urlencode "children[0][children]=0" \
            --data-urlencode "sendEmailConfirmation=false" \
            --data-urlencode "estimatedArrivalTime=15:00")
          echo "=== postReservation response ==="
          echo "$RESPONSE" | python3 -m json.tool || echo "$RESPONSE"
          SUCCESS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('success',''))" 2>/dev/null)
          RES_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('reservationID','') or d.get('data',{}).get('reservationID',''))" 2>/dev/null)
          echo "success=$SUCCESS" >> $GITHUB_OUTPUT
          echo "reservation_id=$RES_ID" >> $GITHUB_OUTPUT
          echo "=== success=$SUCCESS  reservationID=$RES_ID ==="

      - name: Delete test reservation
        if: steps.create.outputs.reservation_id != ''
        run: |
          RES_ID="${{ steps.create.outputs.reservation_id }}"
          echo "=== Deleting reservationID=$RES_ID ==="
          RESPONSE=$(curl -s -X DELETE "https://api.cloudbeds.com/api/v1.3/deleteReservation" \
            -H "x-api-key: ${{ secrets.CLOUDBEDS_API_KEY }}" \
            --data-urlencode "propertyID=${{ secrets.CLOUDBEDS_PROPERTY_ID }}" \
            --data-urlencode "reservationID=$RES_ID")
          echo "=== deleteReservation response ==="
          echo "$RESPONSE" | python3 -m json.tool || echo "$RESPONSE"

      - name: Report result
        run: |
          if [ "${{ steps.create.outputs.success }}" = "True" ] || [ "${{ steps.create.outputs.success }}" = "true" ]; then
            echo "✅ PASS — reservation created and deleted successfully (ID: ${{ steps.create.outputs.reservation_id }})"
          else
            echo "❌ FAIL — postReservation did not return success:true"
            exit 1
          fi
