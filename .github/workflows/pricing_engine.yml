name: HSMI Pricing Engine

on:
  workflow_dispatch:
    # Triggered hourly by cron-job.org via /cron/pricing-engine on Railway.
    # GitHub schedule removed — it was unreliable and caused duplicate runs
    # when both cron entries matched at hour 20 UTC.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  price:
    name: Run Pricing Engine
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pricing engine
        env:
          CLOUDBEDS_API_KEY: ${{ secrets.CLOUDBEDS_API_KEY }}
          CLOUDBEDS_PROPERTY_ID: ${{ secrets.CLOUDBEDS_PROPERTY_ID }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          SLACK_PRICING_WEBHOOK_URL: ${{ secrets.SLACK_PRICING_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pricing_engine/pricing_engine.py
