name: HSMI Pricing Engine

on:
  schedule:
    # 8:00 pm UTC = 6:00 am AEST — daily base run
    - cron: '0 20 * * *'
    # Hourly 9am–11pm AEST = 11pm–1pm UTC (hours 23 and 0–13)
    - cron: '0 0-13,23 * * *'
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions UI

jobs:
  price:
    name: Run Pricing Engine
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pricing engine
        env:
          CLOUDBEDS_API_KEY: ${{ secrets.CLOUDBEDS_API_KEY }}
          CLOUDBEDS_PROPERTY_ID: ${{ secrets.CLOUDBEDS_PROPERTY_ID }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          SLACK_PRICING_WEBHOOK_URL: ${{ secrets.SLACK_PRICING_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pricing_engine/pricing_engine.py
